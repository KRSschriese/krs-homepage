server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip für Text-Formate
    gzip             on;
    gzip_types       text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length  1024;

    # SPA-Fallback (alle unbekannten Routen → index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache-Kontrolle für Assets (die im Dateinamen einen Hash haben können)
    location ~* \.(?:css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # HTML nicht cachen — sonst sieht der User nach Deploys alte Version
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
